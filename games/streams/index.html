<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Streams</title><link rel="stylesheet" href="../game.css"><style>canvas{display:block;width:100%;height:100%;background:#74c7cf}.hud{position:absolute;left:14px;right:14px;top:14px;z-index:4;display:flex;justify-content:space-between}.pill{background:rgba(0,0,0,.7);padding:9px 11px;border:1px solid rgba(255,255,255,.3);font-size:11px;font-weight:900}.touch{position:absolute;left:50%;bottom:15px;transform:translateX(-50%);display:flex;gap:10px;z-index:5}.touch button{width:110px}</style></head><body><div class="top"><strong>STREAMS</strong><button onclick="parent.postMessage('closeExperience','*')">EXIT</button></div><div class="game"><canvas id="c" width="900" height="1050"></canvas><div class="hud"><div class="pill">PENNIES <span id="p">0</span> · ATTENTION <span id="a">0</span></div><div class="pill">GOAL: REACH THE STAGE</div></div><div class="touch"><button class="btn" id="left">← LEFT</button><button class="btn" id="right">RIGHT →</button></div><div class="screen" id="intro"><div class="panel"><h1>Value fights the current.</h1><p>Jump upstream across media objects. Collect pennies. Avoid blue X attention orbs. Too much attention makes your head larger and your jumps harder.</p><div class="actions"><button class="btn primary" id="start">START STREAMS</button></div></div></div><div class="screen" id="ending" style="display:none"><div class="panel"><h1 id="endTitle"></h1><p id="endText"></p><div class="actions"><button class="btn primary" onclick="location.reload()">PLAY AGAIN</button></div></div></div></div><audio id="music" src="https://static.wixstatic.com/mp3/85e419_7be9c7aa18ad4a6db00fd1af6ee7dbcd.mp3"></audio><script>
const ctx=c.getContext('2d');let running=false,last=0,keys={l:false,r:false},player,platforms,coins,orbs,pen=0,att=0,elapsed=0;music.volume=.31;
function reset(){player={x:430,y:890,vx:0,vy:-13,w:42,h:68,head:1};platforms=[];for(let i=0;i<13;i++)platforms.push({x:40+Math.random()*710,y:970-i*82,w:95+Math.random()*105,h:25,label:['VINYL','CD','PHONE','MIC','MPC','PIANO','SPEAKER'][i%7],anchor:i%5===0});coins=[];orbs=[];pen=att=elapsed=0;p.textContent=a.textContent=0}
function hit(o){return Math.hypot(o.x-(player.x+21),o.y-(player.y+18))<o.r+20*player.head}
function update(dt){elapsed+=dt/60;let progress=Math.min(elapsed/120,1),current=1.7+progress*3+Math.max(0,att-pen)*.025;player.vx+=(keys.l?-.65:keys.r?.65:0);player.vx*=.88;player.x=Math.max(0,Math.min(858,player.x+player.vx*dt));player.vy+=.58*dt;player.y+=player.vy*dt+current*.15;platforms.forEach(q=>q.y+=q.anchor?0:current*dt*.85);if(player.vy>0)platforms.forEach(q=>{if(player.x+42>q.x&&player.x<q.x+q.w&&player.y+68>=q.y&&player.y+68<q.y+38){player.y=q.y-68;player.vy=-13-Math.min(pen*.03,2)}});if(Math.random()<.024)coins.push({x:30+Math.random()*840,y:-20,r:11});if(Math.random()<.017+progress*.01){let size=Math.random()<.12?3:Math.random()<.3?2:1;orbs.push({x:30+Math.random()*840,y:-35,r:13*size,val:size===1?1:size===2?3:7})}coins.forEach(o=>o.y+=(current+1.2)*dt);orbs.forEach(o=>o.y+=(current+2)*dt);coins=coins.filter(o=>{if(hit(o)){pen++;p.textContent=pen;return false}return o.y<1080});orbs=orbs.filter(o=>{if(hit(o)){att+=o.val;a.textContent=att;return false}return o.y<1100});player.head=1+Math.min(Math.max(att-pen,0)*.035,.5);if(player.y>1000)return finish(false);if(progress>=1&&player.y<440)return finish(true)}
function draw(){let g=ctx.createLinearGradient(0,0,0,1050);g.addColorStop(0,'#e8fbff');g.addColorStop(.55,'#4fb8c1');g.addColorStop(1,'#073d47');ctx.fillStyle=g;ctx.fillRect(0,0,900,1050);for(let i=0;i<18;i++){ctx.strokeStyle='rgba(255,255,255,.16)';ctx.beginPath();let sx=(i*59+elapsed*18)%900;ctx.moveTo(sx,0);ctx.bezierCurveTo(sx+70,300,sx-50,700,sx+80,1050);ctx.stroke()}ctx.fillStyle='#111';ctx.fillRect(0,0,900,36);ctx.fillStyle='#fff';ctx.font='bold 17px Arial';ctx.fillText('STAGE',420,24);platforms.forEach(q=>{ctx.fillStyle=q.anchor?'#514238':'#f4eee4';ctx.fillRect(q.x,q.y,q.w,q.h);ctx.fillStyle=q.anchor?'#fff':'#111';ctx.font='bold 12px Arial';ctx.fillText(q.label,q.x+7,q.y+17)});coins.forEach(o=>{ctx.fillStyle='#b86d28';ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,7);ctx.fill();ctx.fillStyle='#ffe0a3';ctx.fillText('¢',o.x-4,o.y+4)});orbs.forEach(o=>{ctx.fillStyle='#1875d1';ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,7);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(o.x-o.r*.35,o.y-o.r*.35);ctx.lineTo(o.x+o.r*.35,o.y+o.r*.35);ctx.moveTo(o.x+o.r*.35,o.y-o.r*.35);ctx.lineTo(o.x-o.r*.35,o.y+o.r*.35);ctx.stroke()});ctx.fillStyle='#5b2d1f';ctx.fillRect(player.x+10,player.y+26,22,42);ctx.beginPath();ctx.arc(player.x+21,player.y+17,18*player.head,0,7);ctx.fill()}
function loop(t){if(!running)return;let dt=Math.min((t-last)/16.67,2);last=t;update(dt);draw();requestAnimationFrame(loop)}
function finish(ok){if(!running)return;running=false;music.pause();ending.style.display='flex';endTitle.textContent=ok?'YOU REACHED THE STAGE.':'AAAAAAAHHHHH! · SPLASH!';endText.textContent=`Pennies ${pen} · Attention ${att}. `+(ok?(pen>att?'Whew. You barely created more value than attention.':'You arrived, but attention still outweighed value.'):'Attention can carry you. Value helps you choose the direction.')}
start.onclick=()=>{intro.style.display='none';reset();running=true;music.currentTime=0;music.play().catch(()=>{});last=performance.now();requestAnimationFrame(loop)};document.onkeydown=e=>{if(e.key==='ArrowLeft')keys.l=true;if(e.key==='ArrowRight')keys.r=true};document.onkeyup=e=>{if(e.key==='ArrowLeft')keys.l=false;if(e.key==='ArrowRight')keys.r=false};left.onpointerdown=()=>keys.l=true;left.onpointerup=left.onpointerleave=()=>keys.l=false;right.onpointerdown=()=>keys.r=true;right.onpointerup=right.onpointerleave=()=>keys.r=false;reset();draw()
</script></body></html>
