<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Streams</title><style>
*{box-sizing:border-box}body{margin:0;background:#0B0D0D;color:#fff;font-family:Arial,Helvetica,sans-serif}button,input{font:inherit}button{cursor:pointer}.top{height:64px;padding:0 18px;display:flex;justify-content:space-between;align-items:center;background:#111;border-bottom:1px solid #333}.top a{color:#fff;text-decoration:none;font-size:11px;font-weight:900}.wrap{min-height:calc(100vh - 64px);padding:24px}.btn{border:1px solid #fff;background:transparent;color:#fff;padding:12px 16px;font-weight:900}.primary{background:#0A8F92;border-color:#0A8F92}.orange{background:#D96C2D;border-color:#D96C2D}.panel{max-width:980px;margin:auto}
canvas{display:block;width:min(900px,100%);height:auto;margin:auto;border:1px solid #6AA}.controls{display:flex;justify-content:center;gap:10px;margin-top:12px}</style></head>
<body><div class="top"><strong>STREAMS</strong><a href="../../pages/experiences.html">BACK</a></div><div class="wrap"><div class="panel"><p>Use arrow keys. Collect pennies. Avoid blue X orbs. Stay on platforms.</p><canvas id="c" width="900" height="900"></canvas><div class="controls"><button class="btn" id="l">← LEFT</button><button class="btn primary" id="start">START</button><button class="btn" id="r">RIGHT →</button></div><p>Pennies: <span id="p">0</span> · Attention: <span id="a">0</span></p></div></div>
<audio id="music" src="https://static.wixstatic.com/mp3/85e419_7be9c7aa18ad4a6db00fd1af6ee7dbcd.mp3"></audio><script>
const x=c.getContext('2d');let run=false,px=430,py=760,vx=0,vy=-12,keys={},plats=[],coins=[],orbs=[],pen=0,att=0,last=0;music.volume=.32;
function reset(){plats=[];for(let i=0;i<10;i++)plats.push({x:60+Math.random()*700,y:820-i*85,w:120,h:25});coins=[];orbs=[];px=430;py=760;vx=0;vy=-12;pen=att=0;p.textContent=a.textContent=0}
function loop(t){if(!run)return;let dt=Math.min((t-last)/16.67,2);last=t;vx+=(keys.l?-.6:keys.r?.6:0);vx*=.88;px=Math.max(0,Math.min(858,px+vx));vy+=.55*dt;py+=vy*dt+1.5;plats.forEach(q=>q.y+=1.5*dt);if(vy>0)plats.forEach(q=>{if(px+42>q.x&&px<q.x+q.w&&py+70>=q.y&&py+70<=q.y+35){py=q.y-70;vy=-12.5}});if(Math.random()<.025)coins.push({x:Math.random()*850,y:-20});if(Math.random()<.018)orbs.push({x:Math.random()*850,y:-20});coins.forEach(o=>o.y+=3);orbs.forEach(o=>o.y+=4);coins=coins.filter(o=>{if(Math.hypot(o.x-(px+21),o.y-(py+20))<28){pen++;p.textContent=pen;return false}return o.y<920});orbs=orbs.filter(o=>{if(Math.hypot(o.x-(px+21),o.y-(py+20))<30){att+=3;a.textContent=att;return false}return o.y<920});if(py>850){run=false;music.pause();alert('AAAAAAAHHHHH! SPLASH! Pennies '+pen+' · Attention '+att);return}draw();requestAnimationFrame(loop)}
function draw(){let g=x.createLinearGradient(0,0,0,900);g.addColorStop(0,'#E7FBFF');g.addColorStop(1,'#083F49');x.fillStyle=g;x.fillRect(0,0,900,900);plats.forEach(q=>{x.fillStyle='#F6F0E7';x.fillRect(q.x,q.y,q.w,q.h)});coins.forEach(o=>{x.fillStyle='#B86D28';x.beginPath();x.arc(o.x,o.y,11,0,7);x.fill()});orbs.forEach(o=>{x.fillStyle='#1875D1';x.beginPath();x.arc(o.x,o.y,18,0,7);x.fill();x.strokeStyle='#fff';x.beginPath();x.moveTo(o.x-7,o.y-7);x.lineTo(o.x+7,o.y+7);x.moveTo(o.x+7,o.y-7);x.lineTo(o.x-7,o.y+7);x.stroke()});x.fillStyle='#5A2D20';x.fillRect(px+10,py+25,22,45);x.beginPath();x.arc(px+21,py+16,18+Math.max(0,att-pen)*.15,0,7);x.fill()}
start.onclick=()=>{reset();run=true;music.currentTime=0;music.play().catch(()=>{});last=performance.now();requestAnimationFrame(loop)};document.onkeydown=e=>{if(e.key==='ArrowLeft')keys.l=true;if(e.key==='ArrowRight')keys.r=true};document.onkeyup=e=>{if(e.key==='ArrowLeft')keys.l=false;if(e.key==='ArrowRight')keys.r=false};l.onpointerdown=()=>keys.l=true;l.onpointerup=l.onpointerleave=()=>keys.l=false;r.onpointerdown=()=>keys.r=true;r.onpointerup=r.onpointerleave=()=>keys.r=false;reset();draw();
</script></body></html>
