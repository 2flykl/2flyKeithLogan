<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>I Woke Up in Africa</title><link rel="stylesheet" href="../game.css"><style>body{overflow:auto;background:linear-gradient(180deg,#17353b,#e69a51 48%,#f7e8c4);color:#111}.game{height:auto;min-height:calc(100vh - 60px);padding:25px}.layout{max-width:1120px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:18px}.box{background:rgba(255,253,248,.95);padding:22px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}.choice{padding:12px;border:1px solid #ccc;background:#fff;text-align:left;font-weight:800}.choice.selected{border:2px solid #0a8f92;background:#e8f7f6}.cert{border:8px double #b98948;background:linear-gradient(135deg,#fffdf8,#e8f6f5);padding:24px;min-height:440px;text-align:center}.cert h1{color:#0a8f92}@media(max-width:760px){.layout,.choices{grid-template-columns:1fr}}</style></head><body><div class="top"><strong>I WOKE UP IN AFRICA</strong><button onclick="parent.postMessage('closeExperience','*')">EXIT</button></div><div class="game"><div class="layout"><div class="box"><h2>1. Choose an affirmation</h2><div class="choices" data-group="affirmation"><button class="choice">I move with purpose, not pressure.</button><button class="choice">I deserve peace without earning it.</button><button class="choice">I am prepared for what today brings.</button><button class="choice">I am becoming more honest with myself.</button></div><h2>2. Choose today’s goal</h2><div class="choices" data-group="goal"><button class="choice">Reconciliation</button><button class="choice">Problem solving</button><button class="choice">Exercise</button><button class="choice">Artistic creation</button><button class="choice">Learning</button><button class="choice">Rest</button></div><h2>3. Who will you check on?</h2><input id="person" style="width:100%;padding:12px"><h2>4. Choose one act of self-love</h2><div class="choices" data-group="self"><button class="choice">Meditation</button><button class="choice">Take a walk</button><button class="choice">Set a boundary</button><button class="choice">Make time for a hobby</button></div><button class="btn primary" id="generate" style="margin-top:15px">GENERATE INTENTION</button></div><div><div class="cert" id="cert"><small>I WOKE UP IN AFRICA</small><h1>I WOKE UP READY</h1><p>Your completed intention will appear here.</p></div><button class="btn orange" id="download" style="margin-top:12px;display:none">DOWNLOAD PNG</button></div></div></div><script>
const chosen={};document.querySelectorAll('[data-group]').forEach(group=>group.querySelectorAll('.choice').forEach(btn=>btn.onclick=()=>{group.querySelectorAll('.choice').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');chosen[group.dataset.group]=btn.textContent}));generate.onclick=()=>{if(!chosen.affirmation||!chosen.goal||!chosen.self||!person.value.trim())return alert('Complete all four choices.');cert.innerHTML=`<small>I WOKE UP IN AFRICA</small><h1>TODAY'S INTENTION</h1><p><strong>${chosen.affirmation}</strong></p><p>My goal: ${chosen.goal}</p><p>I will check on: ${person.value}</p><p>My act of self-love: ${chosen.self}</p><p><strong>Today I choose purpose over pressure.</strong></p>`;download.style.display='inline-flex'};download.onclick=()=>{let c=document.createElement('canvas');c.width=1200;c.height=1500;let q=c.getContext('2d');q.fillStyle='#fffaf0';q.fillRect(0,0,1200,1500);q.strokeStyle='#b98948';q.lineWidth=18;q.strokeRect(35,35,1130,1430);q.textAlign='center';q.fillStyle='#0a8f92';q.font='bold 56px Arial';q.fillText('I WOKE UP IN AFRICA',600,170);q.font='bold 72px Arial';q.fillText("TODAY'S INTENTION",600,290);q.fillStyle='#111';q.font='34px Arial';q.fillText(chosen.affirmation,600,490);q.fillText('Goal: '+chosen.goal,600,680);q.fillText('Check on: '+person.value,600,780);q.fillText('Self-love: '+chosen.self,600,880);let a=document.createElement('a');a.download='today-intention.png';a.href=c.toDataURL();a.click()}
</script></body></html>
