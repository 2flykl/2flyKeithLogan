<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>I Woke Up in Africa</title><style>
*{box-sizing:border-box}body{margin:0;background:#0B0D0D;color:#fff;font-family:Arial,Helvetica,sans-serif}button,input{font:inherit}button{cursor:pointer}.top{height:64px;padding:0 18px;display:flex;justify-content:space-between;align-items:center;background:#111;border-bottom:1px solid #333}.top a{color:#fff;text-decoration:none;font-size:11px;font-weight:900}.wrap{min-height:calc(100vh - 64px);padding:24px}.btn{border:1px solid #fff;background:transparent;color:#fff;padding:12px 16px;font-weight:900}.primary{background:#0A8F92;border-color:#0A8F92}.orange{background:#D96C2D;border-color:#D96C2D}.panel{max-width:980px;margin:auto}
body{background:linear-gradient(180deg,#17353B,#E69A51 48%,#F7E8C4);color:#111}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.box{background:rgba(255,253,248,.94);padding:20px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}.choice{padding:12px;border:1px solid #ccc;background:#fff;text-align:left}.sel{border:2px solid #0A8F92;background:#E8F7F6}.cert{border:8px double #B98948;background:#FFFDF8;padding:24px;min-height:390px;text-align:center}@media(max-width:700px){.grid,.choices{grid-template-columns:1fr}}</style></head>
<body><div class="top"><strong>I WOKE UP IN AFRICA</strong><a href="../../pages/experiences.html">BACK</a></div><div class="wrap"><div class="grid"><div class="box"><h3>Affirmation</h3><div class="choices" data-g="aff"><button class="choice">I move with purpose, not pressure.</button><button class="choice">I deserve peace without earning it.</button></div><h3>Goal</h3><div class="choices" data-g="goal"><button class="choice">Reconciliation</button><button class="choice">Artistic creation</button><button class="choice">Rest</button><button class="choice">Exercise</button></div><h3>Who will you check on?</h3><input id="person" style="width:100%;padding:12px"><h3>Self-love</h3><div class="choices" data-g="self"><button class="choice">Meditation</button><button class="choice">Take a walk</button><button class="choice">Set a boundary</button><button class="choice">Make time for a hobby</button></div><button class="btn primary" id="make" style="margin-top:14px">GENERATE</button></div><div><div class="cert" id="cert"><h2>I WOKE UP READY</h2><p>Your intention will appear here.</p></div><button class="btn orange" id="download" style="display:none;margin-top:10px">DOWNLOAD PNG</button></div></div></div>
<script>
const chosen={};document.querySelectorAll('[data-g]').forEach(g=>g.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{g.querySelectorAll('.choice').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');chosen[g.dataset.g]=b.textContent}));make.onclick=()=>{if(!chosen.aff||!chosen.goal||!chosen.self||!person.value.trim())return alert('Complete all choices.');cert.innerHTML=`<h2>TODAY'S INTENTION</h2><p><strong>${chosen.aff}</strong></p><p>Goal: ${chosen.goal}</p><p>Check on: ${person.value}</p><p>Self-love: ${chosen.self}</p>`;download.style.display='inline-flex'};download.onclick=()=>{let c=document.createElement('canvas');c.width=1200;c.height=1500;let q=c.getContext('2d');q.fillStyle='#FFFAF0';q.fillRect(0,0,1200,1500);q.strokeStyle='#B98948';q.lineWidth=18;q.strokeRect(35,35,1130,1430);q.textAlign='center';q.fillStyle='#0A8F92';q.font='bold 60px Arial';q.fillText("TODAY'S INTENTION",600,220);q.fillStyle='#111';q.font='36px Arial';q.fillText(chosen.aff,600,480);q.fillText('Goal: '+chosen.goal,600,650);q.fillText('Check on: '+person.value,600,760);q.fillText('Self-love: '+chosen.self,600,870);let a=document.createElement('a');a.download='intention.png';a.href=c.toDataURL();a.click()}
</script></body></html>
