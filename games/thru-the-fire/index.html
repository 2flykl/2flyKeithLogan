<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Thru the Fire</title><link rel="stylesheet" href="../game.css"><style>
.scene{position:absolute;inset:0;background:radial-gradient(circle at 50% 55%,rgba(255,100,20,.4),transparent 32%),linear-gradient(145deg,#3b170e,#080808);overflow:hidden}.scene:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at center,transparent 30%,rgba(0,0,0,.92) 90%);pointer-events:none}.smoke{position:absolute;inset:-15%;background:repeating-radial-gradient(circle at 40% 120%,rgba(255,255,255,.08) 0 2px,transparent 3px 27px);animation:smoke 8s linear infinite}@keyframes smoke{to{transform:translateY(-90px) scale(1.08)}}.embers{position:absolute;inset:0;background-image:radial-gradient(circle,#ffb14b 0 1px,transparent 2px);background-size:31px 31px;opacity:.4;animation:embers 7s linear infinite}@keyframes embers{to{transform:translateY(-110px)}}.content{position:absolute;inset:0;z-index:3;padding:35px;display:flex;flex-direction:column;justify-content:space-between}.room-head{display:flex;justify-content:space-between}.room-head h1{font-size:50px}.timer{font-size:74px;color:#ff8b3d;font-weight:950}.choices{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.choice{min-height:145px;background:rgba(0,0,0,.68);border:1px solid #888;color:#fff;padding:15px;text-align:left;backdrop-filter:blur(7px)}.choice:hover{border-color:#ff8b3d;transform:translateY(-5px)}@media(max-width:700px){.choices{grid-template-columns:1fr 1fr}.content{padding:18px}.room-head h1{font-size:34px}.timer{font-size:52px}}
</style></head><body><div class="top"><strong>THRU THE FIRE</strong><button onclick="parent.postMessage('closeExperience','*')">EXIT</button></div><div class="game"><div class="scene"><div class="smoke"></div><div class="embers"></div><div class="content"><div class="room-head"><div><small>FIRST-PERSON DECISION</small><h1 id="roomName">LIVING ROOM</h1></div><div class="timer" id="timer">—</div></div><div class="choices" id="choices"></div></div></div><div class="screen" id="intro"><div class="panel"><h1>What would you save?</h1><p>Each room gives you one choice and a randomized amount of time. Everything else is left behind. There are no correct answers—only honest ones.</p><div class="actions"><button class="btn orange" id="start">ENTER THE HOUSE</button></div></div></div><div class="screen" id="ending" style="display:none"><div class="panel"><h1 id="endTitle"></h1><p id="endText"></p><div class="actions"><button class="btn orange" onclick="location.reload()">PLAY AGAIN</button></div></div></div></div><audio id="music" src="https://static.wixstatic.com/mp3/85e419_7810e2c471ce46b5a1c5a664b8307995.mp3"></audio><script>
const rooms=[['LIVING ROOM',['Family photo album','Laptop','Awards','Wedding portrait','Favorite chair']],['BEDROOM',['Wedding ring','Journal','Important documents','Baby picture','Watch']],['STUDIO',['External hard drive','Microphone','MPC','Lyric notebook','Keyboard']],['OFFICE',['Degree','Camera','Letters','Project files','Business records']]];let ri=0,t=0,tick,saved=[];music.volume=.32;
function loadRoom(){if(ri>=rooms.length)return end(true);roomName.textContent=rooms[ri][0];t=7+Math.floor(Math.random()*10);timer.textContent=t;choices.innerHTML='';[...rooms[ri][1]].sort(()=>Math.random()-.5).slice(0,2+Math.floor(Math.random()*4)).forEach(item=>{let b=document.createElement('button');b.className='choice';b.innerHTML='<strong>'+item+'</strong><br><small>Save this. Lose everything else.</small>';b.onclick=()=>{clearInterval(tick);saved.push(item);ri++;loadRoom()};choices.appendChild(b)});clearInterval(tick);tick=setInterval(()=>{t--;timer.textContent=t;if(t<=3)timer.style.color='#ff3220';if(t<=0)end(false)},1000)}
function end(ok){clearInterval(tick);music.pause();ending.style.display='flex';endTitle.textContent=ok?'YOU MADE IT OUT.':'THE HOUSE BURNED.';endText.textContent=(ok?'You chose: ':'Time expired. You saved: ')+(saved.join(' · ')||'nothing')+'. The real question was never what the objects were worth. It was what they represented.'}
start.onclick=()=>{intro.style.display='none';music.currentTime=0;music.play().catch(()=>{});loadRoom()}
</script></body></html>
