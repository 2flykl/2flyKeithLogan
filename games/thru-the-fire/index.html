<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Thru the Fire</title><style>
*{box-sizing:border-box}body{margin:0;background:#0B0D0D;color:#fff;font-family:Arial,Helvetica,sans-serif}button,input{font:inherit}button{cursor:pointer}.top{height:64px;padding:0 18px;display:flex;justify-content:space-between;align-items:center;background:#111;border-bottom:1px solid #333}.top a{color:#fff;text-decoration:none;font-size:11px;font-weight:900}.wrap{min-height:calc(100vh - 64px);padding:24px}.btn{border:1px solid #fff;background:transparent;color:#fff;padding:12px 16px;font-weight:900}.primary{background:#0A8F92;border-color:#0A8F92}.orange{background:#D96C2D;border-color:#D96C2D}.panel{max-width:980px;margin:auto}

.scene{position:relative;min-height:calc(100vh - 64px);overflow:hidden;background:radial-gradient(circle at center,rgba(255,104,20,.3),transparent 30%),linear-gradient(145deg,#3C1A10,#090909)}.scene:before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,transparent 35%,rgba(0,0,0,.9) 88%);z-index:2}.smoke{position:absolute;inset:-10%;background:repeating-radial-gradient(circle at 40% 120%,rgba(255,255,255,.08) 0 2px,transparent 3px 26px);animation:s 8s linear infinite}@keyframes s{to{transform:translateY(-80px)}}.content{position:relative;z-index:4;padding:40px;display:flex;flex-direction:column;justify-content:space-between;min-height:calc(100vh - 64px)}.timer{font-size:70px;color:#FF8B3D;font-weight:900}.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.choice{min-height:150px;background:rgba(0,0,0,.65);color:#fff;border:1px solid #777;padding:15px;text-align:left}@media(max-width:700px){.choices{grid-template-columns:1fr}}</style></head>
<body><div class="top"><strong>THRU THE FIRE</strong><a href="../../pages/experiences.html">BACK</a></div><div class="scene"><div class="smoke"></div><div class="content"><div><h1 id="room">READY?</h1><div class="timer" id="timer">—</div></div><div class="choices" id="choices"><button class="btn orange" id="start">ENTER THE HOUSE</button></div></div></div>
<audio id="music" src="https://static.wixstatic.com/mp3/85e419_7810e2c471ce46b5a1c5a664b8307995.mp3"></audio>
<script>
const rooms=[['LIVING ROOM',['Family photo album','Laptop','Awards','Wedding portrait']],['BEDROOM',['Wedding ring','Journal','Important documents','Baby picture']],['STUDIO',['External hard drive','Microphone','MPC','Lyric notebook']],['OFFICE',['Degree','Camera','Letters','Project files']]];let ri=0,tick,time,saved=[];music.volume=.35;
function load(){if(ri>=rooms.length)return end(true);room.textContent=rooms[ri][0];time=8+Math.floor(Math.random()*8);timer.textContent=time;choices.innerHTML='';rooms[ri][1].sort(()=>Math.random()-.5).slice(0,2+Math.floor(Math.random()*3)).forEach(item=>{let b=document.createElement('button');b.className='choice';b.innerHTML='<strong>'+item+'</strong><br>Save this. Lose everything else.';b.onclick=()=>{clearInterval(tick);saved.push(item);ri++;load()};choices.appendChild(b)});clearInterval(tick);tick=setInterval(()=>{time--;timer.textContent=time;if(time<=0)end(false)},1000)}
function end(ok){clearInterval(tick);music.pause();room.textContent=ok?'YOU MADE IT OUT.':'THE HOUSE BURNED.';timer.textContent='';choices.innerHTML='<div><p>'+saved.join(' · ')+'</p><p>There were no correct choices—only honest ones.</p><button class="btn orange" onclick="location.reload()">PLAY AGAIN</button></div>'}
start.onclick=()=>{ri=0;saved=[];music.currentTime=0;music.play().catch(()=>{});load()}
</script></body></html>
