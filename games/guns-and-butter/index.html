<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Guns & Butter</title><style>
*{box-sizing:border-box}body{margin:0;background:#0B0D0D;color:#fff;font-family:Arial,Helvetica,sans-serif}button,input{font:inherit}button{cursor:pointer}.top{height:64px;padding:0 18px;display:flex;justify-content:space-between;align-items:center;background:#111;border-bottom:1px solid #333}.top a{color:#fff;text-decoration:none;font-size:11px;font-weight:900}.wrap{min-height:calc(100vh - 64px);padding:24px}.btn{border:1px solid #fff;background:transparent;color:#fff;padding:12px 16px;font-weight:900}.primary{background:#0A8F92;border-color:#0A8F92}.orange{background:#D96C2D;border-color:#D96C2D}.panel{max-width:980px;margin:auto}
.options{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.keys{display:flex;align-items:flex-start;overflow:auto;background:#111;padding:15px}.key{width:34px;height:180px;background:#fff;color:#111;border:1px solid #222;flex:0 0 auto}.black{width:22px;height:112px;background:#111;color:#fff;margin:0 -11px;z-index:2}.flash{background:#D96C2D!important;color:#fff}@media(max-width:700px){.options{grid-template-columns:1fr}}</style></head>
<body><div class="top"><strong>GUNS & BUTTER</strong><a href="../../pages/experiences.html">BACK</a></div><div class="wrap"><div class="panel"><h1>PIANO MEMORY</h1><div class="options" id="opts"><button class="btn" data-k="16">16 KEYS</button><button class="btn" data-k="32">32 KEYS</button><button class="btn" data-k="61">61 KEYS</button><button class="btn" data-k="88">88 KEYS</button></div><div id="game" style="display:none"><p id="status">Watch the pattern.</p><div class="keys" id="keys"></div><button class="btn orange" id="start" style="margin-top:12px">START</button></div></div></div>
<script>
const AC=window.AudioContext||window.webkitAudioContext;let ac,kc=16,seq=[],user=[],accept=false,round=0;function tone(n){if(!ac)ac=new AC();let o=ac.createOscillator(),g=ac.createGain();o.frequency.value=110*Math.pow(2,n/12);g.gain.value=.15;o.connect(g);g.connect(ac.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.4);o.stop(ac.currentTime+.4)}function build(){opts.style.display='none';game.style.display='block';keys.innerHTML='';for(let i=0;i<kc;i++){let b=document.createElement('button');b.className='key'+([1,3,6,8,10].includes(i%12)?' black':'');b.onclick=()=>press(i,b);keys.appendChild(b)}}function press(i,b){tone(i);b.classList.add('flash');setTimeout(()=>b.classList.remove('flash'),150);if(!accept)return;user.push(i);if(user[user.length-1]!==seq[user.length-1]){accept=false;status.textContent='Missed it. Press START.'}else if(user.length===seq.length){accept=false;round++;status.textContent='Correct.';setTimeout(nextPattern,600)}}function nextPattern(){seq.push(Math.floor(Math.random()*kc));user=[];let ks=[...document.querySelectorAll('.key')];status.textContent='Watch';seq.forEach((n,i)=>setTimeout(()=>{tone(n);ks[n].classList.add('flash');setTimeout(()=>ks[n].classList.remove('flash'),200)},i*500));setTimeout(()=>{accept=true;status.textContent='Your turn'},seq.length*500+200)}document.querySelectorAll('[data-k]').forEach(b=>b.onclick=()=>{kc=+b.dataset.k;build()});start.onclick=()=>{seq=[];round=1;nextPattern()}
</script></body></html>
