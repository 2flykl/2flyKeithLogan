<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Guns & Butter</title><link rel="stylesheet" href="../game.css"><style>body{overflow:auto;background:linear-gradient(135deg,#171919,#2b1a12)}.game{height:auto;min-height:calc(100vh - 60px);padding:25px}.options{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}.instrument{padding:22px;background:#fff;color:#111;border:1px solid #ddd;text-align:center;font-weight:900}.piano{overflow:auto;background:#111;padding:17px;margin-top:18px}.keys{display:flex;align-items:flex-start;min-width:max-content}.key{width:34px;height:180px;border:1px solid #222;background:#fff;color:#111;display:flex;align-items:end;justify-content:center;padding-bottom:7px;font-size:9px}.key.black{width:22px;height:112px;margin:0 -11px;z-index:2;background:#111;color:#fff}.key.flash{background:#d96c2d!important;color:#fff}.status{font-size:22px;font-weight:900;margin:15px 0}@media(max-width:760px){.options{grid-template-columns:1fr 1fr}}</style></head><body><div class="top"><strong>GUNS & BUTTER</strong><button onclick="(window.parent!==window?window.parent.postMessage('closeExperience','*'):window.location.href='../../#experiences')">EXIT</button></div><div class="game"><div class="panel" style="max-width:1180px;background:transparent;color:#fff"><div id="select"><h1>Choose your instrument.</h1><div class="options"><button class="instrument" data-keys="16">MIDI BOARD<br>16 KEYS</button><button class="instrument" data-keys="32">KEYBOARD<br>32 KEYS</button><button class="instrument" data-keys="61">NICE KEYBOARD<br>61 KEYS</button><button class="instrument" data-keys="88">GRAND PIANO<br>88 KEYS</button></div></div><div id="gamePlay" style="display:none"><h1 id="title">PIANO MEMORY</h1><div class="status" id="status">Watch the pattern, then repeat it.</div><div class="piano"><div class="keys" id="keys"></div></div><div class="actions"><button class="btn orange" id="start">START PATTERN</button><button class="btn" onclick="location.reload()">CHANGE INSTRUMENT</button></div></div></div></div><script>
const AC=window.AudioContext||window.webkitAudioContext;let ac,count=16,seq=[],user=[],accept=false,round=0;function tone(n){if(!ac)ac=new AC();let o=ac.createOscillator(),g=ac.createGain();o.frequency.value=110*Math.pow(2,n/12);o.type='triangle';g.gain.setValueAtTime(.17,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.42);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+.42)}function build(){select.style.display='none';gamePlay.style.display='block';title.textContent=count+'-KEY MEMORY';keys.innerHTML='';for(let i=0;i<count;i++){let b=document.createElement('button');b.className='key'+([1,3,6,8,10].includes(i%12)?' black':'');b.onclick=()=>press(i,b);keys.appendChild(b)}}function press(i,b){tone(i);b.classList.add('flash');setTimeout(()=>b.classList.remove('flash'),160);if(!accept)return;user.push(i);if(user[user.length-1]!==seq[user.length-1]){accept=false;status.textContent='Missed it on round '+round+'. Press START to try again.'}else if(user.length===seq.length){accept=false;round++;status.textContent='Correct. Next pattern...';setTimeout(next,650)}}function next(){seq.push(Math.floor(Math.random()*count));user=[];accept=false;status.textContent='Round '+(round+1)+' · Watch';let ks=[...document.querySelectorAll('.key')];seq.forEach((n,i)=>setTimeout(()=>{tone(n);ks[n].classList.add('flash');setTimeout(()=>ks[n].classList.remove('flash'),220)},i*520));setTimeout(()=>{accept=true;status.textContent='Your turn.'},seq.length*520+220)}document.querySelectorAll('[data-keys]').forEach(b=>b.onclick=()=>{count=+b.dataset.keys;build()});start.onclick=()=>{seq=[];round=1;next()}
</script></body></html>
